<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>阪急OASIS · AI先導型モバイルアプリ 全画面</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; overflow: hidden; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/theme.jsx"></script>
<script type="text/babel" src="lib/design-canvas.jsx"></script>
<script type="text/babel" src="lib/mobile-shared.jsx"></script>
<script type="text/babel" src="lib/mobile-overlays.jsx"></script>
<script type="text/babel" src="lib/mobile-a.jsx"></script>
<script type="text/babel" src="lib/mobile-b.jsx"></script>
<script type="text/babel" src="lib/mobile-c-tabs.jsx"></script>
<script type="text/babel" src="lib/mobile-c-detail.jsx"></script>
<script type="text/babel" src="lib/mobile-c-extra.jsx"></script>
<script type="text/babel" src="lib/mobile-c-misc.jsx"></script>
<script type="text/babel" src="lib/mobile-c.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas title="阪急OASIS · AI 先導型モバイルアプリ"
                  subtitle="案 C を全機能込みで構築 · 13 画面 + 3 案比較"
                  bg="#f0eee9">

      {/* C メインタブ */}
      <DCSection id="c-tabs" title="① メインタブ" subtitle="ボトムナビ 5 本 · ホーム / チラシ / クーポン / レシピ / マイページ">
        <DCArtboard id="c-home"   label="ホーム · AIヒーロー" width={390} height={844}><MobileC start="home"/></DCArtboard>
        <DCArtboard id="c-flyer"  label="チラシ · AIセット提案" width={390} height={844}><MobileC start="flyer"/></DCArtboard>
        <DCArtboard id="c-coupon" label="クーポン · 黒ヒーロー" width={390} height={844}><MobileC start="coupon"/></DCArtboard>
        <DCArtboard id="c-recipe" label="レシピ一覧" width={390} height={844}><MobileC start="recipe"/></DCArtboard>
        <DCArtboard id="c-mypage" label="マイページ · AI使用統計" width={390} height={844}><MobileC start="mypage"/></DCArtboard>
      </DCSection>

      {/* C サブ画面 */}
      <DCSection id="c-sub" title="② サブ画面" subtitle="購買・献立・店内ナビ・アシスタント — 各タブから遷移">
        <DCArtboard id="c-list"    label="買い物リスト · フル"    width={390} height={844}><MobileC start="shopping-list"/></DCArtboard>
        <DCArtboard id="c-product" label="商品詳細 · 売場ナビ付き" width={390} height={844}><MobileC start="product"/></DCArtboard>
        <DCArtboard id="c-recipe-d" label="レシピ詳細"          width={390} height={844}><MobileC start="recipe-detail"/></DCArtboard>
        <DCArtboard id="c-map"     label="店内ナビ · 売場地図"     width={390} height={844}><MobileC start="aisle-map"/></DCArtboard>
        <DCArtboard id="c-chat"    label="AI チャット · フル画面"  width={390} height={844}><MobileC start="ai-chat"/></DCArtboard>
        <DCArtboard id="c-search"  label="検索 · AI質問対応"      width={390} height={844}><MobileC start="search"/></DCArtboard>
        <DCArtboard id="c-notif"   label="お知らせ"               width={390} height={844}><MobileC start="notif"/></DCArtboard>
        <DCArtboard id="c-barcode" label="会員バーコード"         width={390} height={844}><MobileC start="barcode"/></DCArtboard>
      </DCSection>

      {/* 3案比較 (参照用) */}
      <DCSection id="compare" title="③ ホームレイアウト 3 案比較" subtitle="参照用 · 同じタブ構造でホームのアプローチを比較">
        <DCArtboard id="cmp-a" label="案 A · 標準型" width={390} height={844}><MobileA/></DCArtboard>
        <DCArtboard id="cmp-b" label="案 B · チラシ起点" width={390} height={844}><MobileB/></DCArtboard>
        <DCArtboard id="cmp-c" label="案 C · AI 先導 (採用)" width={390} height={844}><MobileC/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<a href="Prototype.html" style="
  position: fixed; bottom: 16px; right: 16px; z-index: 9999;
  padding: 10px 16px; border-radius: 999px;
  background: #2e8540; color: #fff;
  text-decoration: none; font-size: 12px; font-weight: 800;
  letter-spacing: .08em; font-family: -apple-system, 'Noto Sans JP', sans-serif;
  box-shadow: 0 8px 24px rgba(46,133,64,.4);
">▶ プロトタイプを起動</a>

<a href="Admin.html" style="
  position: fixed; bottom: 16px; right: 200px; z-index: 9999;
  padding: 8px 14px; border-radius: 999px;
  background: rgba(20,20,20,.92); color: #fff;
  text-decoration: none; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; font-family: -apple-system, 'Noto Sans JP', sans-serif;
  box-shadow: 0 8px 24px rgba(0,0,0,.2); backdrop-filter: blur(8px);
">管理コンソール →</a>

</body>
</html>
