<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#1a1a1a"/>
<title>阪急OASIS · webアプリ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #efece4;
    font-family: 'Noto Sans JP', -apple-system, system-ui, sans-serif;
    color: #1a1a1a;
  }
  #root {
    width: 100vw; height: 100vh; height: 100dvh;
    display: flex; align-items: center; justify-content: center;
  }
  /* The app frame. PhoneBezel renders <div class="app-shell">. */
  .app-shell {
    width: 100%; height: 100%;
    position: relative; overflow: hidden;
    background: #ffffff;
  }
  /* Tablet & desktop — center the app as a phone-shaped column on the backdrop. */
  @media (min-width: 540px) {
    body { background:
      radial-gradient(ellipse at top, rgba(46,133,64,.05) 0%, transparent 60%),
      #efece4; }
    .app-shell {
      max-width: 480px;
      max-height: min(100dvh, 920px);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(40, 30, 10, .14), 0 0 0 1px rgba(0,0,0,.05);
    }
  }
  @media (min-width: 1024px) {
    .app-shell { max-width: 440px; max-height: min(100dvh - 40px, 900px); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/theme.jsx"></script>
<script type="text/babel" src="lib/mobile-shared.jsx"></script>
<script type="text/babel" src="lib/mobile-overlays.jsx"></script>
<script type="text/babel" src="lib/mobile-c-tabs.jsx"></script>
<script type="text/babel" src="lib/mobile-c-detail.jsx"></script>
<script type="text/babel" src="lib/mobile-c-extra.jsx"></script>
<script type="text/babel" src="lib/mobile-c-misc.jsx"></script>
<script type="text/babel" src="lib/mobile-c.jsx"></script>

<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<MobileC start="home"/>);
</script>

</body>
</html>
